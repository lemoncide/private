llm:
  model: "meta-llama/llama-4-scout-17b-16e-instruct"
  api_key: "${GROQ_API_KEY}"
  api_base: "https://api.groq.com/openai/v1"

mcp:
  servers:
    official_filesystem:
      command: "npx.cmd"
      args: 
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "E:\\study\\M2\\Agent" # Restrict to sandbox for safety

    official_github:
      command: "npx.cmd"
      args:
        - "-y"
        - "@modelcontextprotocol/server-github"
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}" # Injected from env var

    fetch:
      command: "python"
      args:
        - "-m"
        - "mcp_server_fetch"
