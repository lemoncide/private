llm:
  model: "gpt-3.5-turbo"
  api_key: "lm-studio"
  api_base: "http://127.0.0.1:1234/v1"

mcp:
  servers:
    official_filesystem:
      command: "npx.cmd"
      args: 
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "E:\\study\\M2\\Agent\\sandbox" # Restrict to sandbox for safety

    official_github:
      command: "npx.cmd"
      args:
        - "-y"
        - "@modelcontextprotocol/server-github"
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}" # Injected from env var
