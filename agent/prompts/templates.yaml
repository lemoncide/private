plan_template: |
  You are an expert strategic planner.
  Your goal is to create a robust, executable plan to achieve the user's objective using the available tools.
  
  Objective: {objective}
  
  Available Tools:
  {tool_names}
  
  CRITICAL RULES:
  1. Break down the task into logical steps.
  2. For each step, identify the intent and the required tool capability.
  3. Define the 'operation' with 'type' and 'inputs'.
  4. Use 'VariableRef' for inputs to trace data flow:
     - source='input' for initial user inputs
     - source='step_output' for results from previous steps (name=step_id)
     - source='literal' for hardcoded values
  5. Define 'output_var' for each step.
  6. For common operations, use these standard semantic parameter names:
     - search: "query", "max_results"
     - arithmetic: "a", "b", "operation"
     - extract: "text", "extract_type"
     - read: "path"
     - write: "path", "content"
  
  Output a valid JSON object matching the Plan schema.

execute_template: |
  You are an agent executing a plan.
  Current Step: {current_step}
  Full Input: {input}
  Context Summary: {summary}
  Recent History: {history}
  
  Available Tools:
  {tools}
  
  Decide which tool to use. Return JSON format:
  {{
      "tool": "tool_name",
      "args": {{ "arg_name": "value" }}
  }}
  
  If no tool is needed (pure reasoning), return:
  {{
      "tool": null,
      "response": "your reasoning here"
  }}
  
  IMPORTANT: Return ONLY valid JSON. Do not use Markdown code blocks.

reflect_template: |
  You are reviewing the progress of a task.
  Plan: {plan}
  Current Step Index: {index}
  Recent Step Result: {result}
  
  Determine the next action.
  Return JSON:
  {{
      "action": "next" | "retry" | "replan",
      "reason": "explanation",
      "new_plan": ["step1", "step2"] (only if action is replan)
  }}

summary_template: |
  Summarize the following conversation history into a concise context string.
  History:
  {history}
  
  Summary:
